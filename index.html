<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HESYRE - Strona w przebudowie</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-light: #7ab83e;
      --green-dark:  #2d6e1e;
      --blue-light:  #1e88e5;
      --blue-dark:   #1a3560;
      --white:       #ffffff;
      --white-soft:  rgba(255,255,255,0.85);
      --white-muted: rgba(255,255,255,0.60);
      --accent:      #4caf7d;
    }

    html, body {
      height: 100%;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      background-image:
        url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center;
      filter: grayscale(100%) brightness(0.38);
      transform: scale(1.04);
      animation: slowZoom 20s ease-in-out infinite alternate;
    }

    @keyframes slowZoom {
      from { transform: scale(1.04); }
      to   { transform: scale(1.10); }
    }

    /* soft dark vignette */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%);
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 52px 24px 32px;
      text-align: center;
    }

    /* ── LOGO ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      animation: fadeDown 1s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo { width: min(420px, 82vw); height: auto; display: block; }

    /* ── MAIN CONTENT ── */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: fadeUp 1.1s 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .headline {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      color: var(--white);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .subline {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      color: var(--white-muted);
      line-height: 1.8;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--green-light), var(--blue-light));
      border-radius: 2px;
      margin: 4px 0;
      animation: fadeUp 1.1s 0.4s ease both;
    }

    /* ── CONTACT ── */
    .contact {
      animation: fadeUp 1.1s 0.5s ease both;
    }

    .contact p {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: clamp(0.82rem, 1.6vw, 0.95rem);
      color: var(--white-muted);
      margin-bottom: 8px;
    }

    .contact a {
      display: block;
      color: var(--white-soft);
      text-decoration: underline;
      text-decoration-color: rgba(255,255,255,0.30);
      text-underline-offset: 3px;
      font-size: clamp(0.82rem, 1.6vw, 0.93rem);
      font-weight: 300;
      line-height: 1.9;
      transition: color 0.2s, text-decoration-color 0.2s;
    }

    .contact a:hover {
      color: var(--accent);
      text-decoration-color: var(--accent);
    }

    /* ── FOOTER ── */
    .footer {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
      animation: fadeUp 1.1s 0.7s ease both;
    }
  </style>
</head>
